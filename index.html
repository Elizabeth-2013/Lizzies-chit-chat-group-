<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizzie's Chat Group</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group small {
            display: block;
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .button-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .button-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .button-secondary:hover {
            background: #e0e0e0;
        }

        /* Chat Screen */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 600px;
            background: #f5f5f5;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 16px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .exit-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .exit-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .online-users {
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            max-height: 80px;
            overflow-y: auto;
        }

        .online-users strong {
            display: block;
            margin-bottom: 6px;
            color: #333;
        }

        .user-tag {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
            margin-right: 6px;
            margin-bottom: 4px;
            font-size: 11px;
        }

        .user-tag.online::before {
            content: "● ";
            color: #4caf50;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            word-break: break-word;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.other .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #666;
        }

        .message.own .message-name {
            color: #667eea;
            text-align: right;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .message.own .message-time {
            text-align: right;
        }

        .system-message {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 15px 0;
            font-style: italic;
        }

        .typing-indicator {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 10px;
            font-style: italic;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            font-family: inherit;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .info-box {
            background: #e3f2fd;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #333;
        }

        .info-box strong {
            color: #667eea;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #c62828;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div class="screen active" id="welcomeScreen">
            <div class="header">
                <h1>💬 Lizzie's Chat</h1>
                <p>Real-time Group Chat Application</p>
            </div>
            <div class="content">
                <div class="error-message" id="welcomeError"></div>

                <div class="info-box">
                    <strong>How it works:</strong><br>
                    Enter your name, choose a group, and start chatting in real-time!
                </div>

                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="userName" placeholder="Enter your name" maxlength="20" autocomplete="off">
                    <small>1-20 characters</small>
                </div>

                <div class="form-group">
                    <label>Select Group</label>
                    <select id="groupSelect">
                        <option value="">Choose a group...</option>
                        <option value="General">General Chat</option>
                        <option value="Friends">Friends Only</option>
                        <option value="Work">Work Team</option>
                        <option value="Gaming">Gaming Squad</option>
                        <option value="Random">Random Talk</option>
                    </select>
                </div>

                <button class="button button-primary" id="joinBtn" onclick="joinGroup()">Enter Group</button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div class="screen" id="chatScreen">
            <div class="chat-container">
                <div class="chat-header">
                    <div>
                        <h2 id="groupName">Group</h2>
                        <p id="userInfo">You: Your Name</p>
                    </div>
                    <button class="exit-btn" onclick="exitGroup()">Leave</button>
                </div>

                <div class="online-users" id="onlineUsers">
                    <strong>Online Members:</strong>
                    <div id="membersList"></div>
                </div>

                <div class="messages" id="messagesContainer">
                    <div class="empty-state">No messages yet. Start the conversation! 💬</div>
                </div>

                <div class="input-area">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type a message..." 
                        maxlength="500"
                        onkeypress="handleKeyPress(event)"
                        oninput="handleTyping()">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message (Enter)">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============= CONSTANTS =============
        const GROUPS = {
            GENERAL: 'General',
            FRIENDS: 'Friends',
            WORK: 'Work',
            GAMING: 'Gaming',
            RANDOM: 'Random'
        };

        const MESSAGE_TYPES = {
            USER: 'user',
            SYSTEM: 'system'
        };

        // ============= STATE MANAGEMENT =============
        const allMessages = {
            'General': [],
            'Friends': [],
            'Work': [],
            'Gaming': [],
            'Random': []
        };

        const onlineUsers = {
            'General': new Set(),
            'Friends': new Set(),
            'Work': new Set(),
            'Gaming': new Set(),
            'Random': new Set()
        };

        const typingUsers = {
            'General': new Set(),
            'Friends': new Set(),
            'Work': new Set(),
            'Gaming': new Set(),
            'Random': new Set()
        };

        let currentUser = '';
        let currentGroup = '';
        let typingTimeout = null;

        // ============= VALIDATION FUNCTIONS =============
        function validateInput(input, minLength = 1, maxLength = 20) {
            const trimmed = input.trim();
            return trimmed.length >= minLength && trimmed.length <= maxLength;
        }

        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input.trim();
            return div.innerHTML;
        }

        function showError(message, screen = 'welcome') {
            const errorElement = document.getElementById(screen === 'welcome' ? 'welcomeError' : 'chatError');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
                setTimeout(() => {
                    errorElement.classList.remove('show');
                }, 5000);
            }
        }

        // ============= GROUP MANAGEMENT =============
        function joinGroup() {
            const userName = document.getElementById('userName').value;
            const groupSelect = document.getElementById('groupSelect').value;

            // Validation
            if (!validateInput(userName, 1, 20)) {
                showError('Name must be 1-20 characters!');
                return;
            }

            if (!groupSelect) {
                showError('Please select a group!');
                return;
            }

            currentUser = sanitizeInput(userName);
            currentGroup = groupSelect;

            // Add user to online list
            onlineUsers[currentGroup].add(currentUser);

            // Switch screens
            document.getElementById('welcomeScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');

            // Update UI
            document.getElementById('groupName').textContent = currentGroup + ' Chat';
            document.getElementById('userInfo').textContent = 'You: ' + currentUser;

            // Add system message
            addSystemMessage(currentUser + ' joined the group! 👋');

            // Load data
            updateMembersList();
            loadMessages();

            // Focus input
            document.getElementById('messageInput').focus();
        }

        function exitGroup() {
            // Remove user from online list
            onlineUsers[currentGroup].delete(currentUser);
            typingUsers[currentGroup].delete(currentUser);

            // Add leave message
            addSystemMessage(currentUser + ' left the group 👋');

            // Switch screens
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('welcomeScreen').classList.add('active');

            // Clear inputs
            document.getElementById('userName').value = '';
            document.getElementById('groupSelect').value = '';
            document.getElementById('messageInput').value = '';

            currentUser = '';
            currentGroup = '';
        }

        // ============= MESSAGE MANAGEMENT =============
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();

            if (!messageText) return;

            if (messageText.length > 500) {
                showError('Message is too long (max 500 characters)');
                return;
            }

            const message = {
                user: currentUser,
                text: sanitizeInput(messageText),
                time: new Date(),
                id: Date.now(),
                type: MESSAGE_TYPES.USER
            };

            allMessages[currentGroup].push(message);
            messageInput.value = '';

            // Remove typing indicator
            typingUsers[currentGroup].delete(currentUser);

            // Refresh UI
            loadMessages();
            messageInput.focus();

            // Save to localStorage
            saveToLocalStorage();
        }

        function addSystemMessage(text) {
            const message = {
                user: 'System',
                text: text,
                time: new Date(),
                id: Date.now(),
                type: MESSAGE_TYPES.SYSTEM
            };
            allMessages[currentGroup].push(message);
            saveToLocalStorage();
        }

        function loadMessages() {
            const messagesContainer = document.getElementById('messagesContainer');
            const messages = allMessages[currentGroup];

            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Start the conversation! 💬</div>';
                return;
            }

            messagesContainer.innerHTML = messages.map(msg => {
                const isOwn = msg.user === currentUser;

                if (msg.type === MESSAGE_TYPES.SYSTEM) {
                    return `<div class="system-message">${msg.text}</div>`;
                }

                const hours = msg.time.getHours().toString().padStart(2, '0');
                const mins = msg.time.getMinutes().toString().padStart(2, '0');

                return `
                    <div class="message ${isOwn ? 'own' : 'other'}">
                        <div>
                            <div class="message-name">${msg.user}</div>
                            <div class="message-bubble">
                                ${msg.text}
                                <div class="message-time">${hours}:${mins}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Show typing indicator
            if (typingUsers[currentGroup].size > 0) {
                const typingList = Array.from(typingUsers[currentGroup])
                    .filter(u => u !== currentUser)
                    .join(', ');
                
                if (typingList) {
                    messagesContainer.innerHTML += `
                        <div class="typing-indicator">
                            ${typingList} is typing
                            <span></span><span></span><span></span>
                        </div>
                    `;
                }
            }

            // Auto-scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 10);
        }

        // ============= TYPING INDICATORS =============
        function handleTyping() {
            // Add user to typing set
            typingUsers[currentGroup].add(currentUser);
            loadMessages();

            // Clear existing timeout
            clearTimeout(typingTimeout);

            // Set new timeout to remove typing indicator
            typingTimeout = setTimeout(() => {
                typingUsers[currentGroup].delete(currentUser);
                loadMessages();
            }, 2000);
        }

        // ============= USER MANAGEMENT =============
        function updateMembersList() {
            const membersList = document.getElementById('membersList');
            const members = Array.from(onlineUsers[currentGroup]);

            if (members.length === 0) {
                membersList.innerHTML = '<div class="user-tag">No one online</div>';
                return;
            }

            membersList.innerHTML = members.map(member => 
                `<span class="user-tag online">${member}</span>`
            ).join('');
        }

        // ============= EVENT HANDLERS =============
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // ============= LOCAL STORAGE =============
        function saveToLocalStorage() {
            try {
                const dataToSave = {};
                Object.keys(allMessages).forEach(group => {
                    dataToSave[group] = allMessages[group];
                });
                localStorage.setItem('chatMessages', JSON.stringify(dataToSave));
            } catch (e) {
                console.warn('Failed to save to localStorage:', e);
            }
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('chatMessages');
                if (saved) {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(group => {
                        if (allMessages[group]) {
                            allMessages[group] = data[group].map(msg => ({
                                ...msg,
                                time: new Date(msg.time)
                            }));
                        }
                    });
                }
            } catch (e) {
                console.warn('Failed to load from localStorage:', e);
            }
        }

        // ============= INITIALIZATION =============
        document.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage();
        });

        // Periodic UI updates (every 1 second instead of 500ms for better performance)
        setInterval(() => {
            if (currentGroup) {
                updateMembersList();
            }
        }, 1000);
    </script>
</body>
</html>
